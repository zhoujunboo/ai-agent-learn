services:
  chat:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: development
    volumes:
      - ../../services/api:/app/services/api
      - ../../packages/contracts:/app/packages/contracts
  chat-web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    environment:
      NODE_ENV: development
    volumes:
      - ../../clients/web:/app/clients/web
      - ../../packages/contracts:/app/packages/contracts
